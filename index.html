<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🎁 Participation Cadeau</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .container {
            max-width: 900px;
        }

        .participant-card {
            transition: all 0.2s ease;
        }

        .participant-card:hover {
            transform: translateY(-2px);
        }

        .progress {
            height: 28px;
        }

        .progress-bar {
            font-weight: bold;
        }

        .summary-value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .money-green {
            color: #198754;
        }

        .money-red {
            color: #dc3545;
        }
    </style>
</head>

<body>

<div class="container py-4">

    <h1 class="text-center mb-4">
        🎁 Répartition du coût d'un cadeau
    </h1>

    <!-- Configuration -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <div class="mb-3">
                <label class="form-label">
                    Nombre de participants
                </label>

                <input
                    type="number"
                    id="nbParticipants"
                    class="form-control"
                    min="1">
            </div>

            <button
                class="btn btn-primary"
                onclick="genererParticipants()">
                Créer les participants
            </button>

            <div
                id="zoneParticipants"
                class="mt-4">
            </div>

        </div>
    </div>

    <!-- Prix -->
    <div
        class="card shadow-sm mb-4"
        id="zoneMontant"
        style="display:none;">

        <div class="card-body">

            <label class="form-label">
                Prix total du cadeau (€)
            </label>

            <input
                type="number"
                id="prixTotal"
                class="form-control"
                step="0.01"
                min="0">

            <button
                class="btn btn-success mt-3"
                onclick="calculer()">
                Calculer les participations
            </button>

        </div>

    </div>

    <!-- Résultats -->
    <div
        class="card shadow-sm"
        id="resultats"
        style="display:none;">

        <div class="card-body">

            <h2 class="mb-4">
                Suivi des paiements
            </h2>

            <!-- Progression -->
            <div class="mb-4">

                <label class="form-label fw-bold">
                    Progression de la collecte
                </label>

                <div class="progress">

                    <div
                        id="progressBar"
                        class="progress-bar"
                        role="progressbar"
                        style="width:0%">
                        0%
                    </div>

                </div>

                <div class="mt-2">

                    <strong>
                        <span id="pourcentageCollecte">
                            0
                        </span>
                        % collecté
                    </strong>

                </div>

            </div>

            <!-- Boutons -->
            <div class="mb-4">

                <button
                    class="btn btn-success me-2"
                    onclick="toutCocher()">
                    ✅ Tout cocher
                </button>

                <button
                    class="btn btn-warning"
                    onclick="toutDecocher()">
                    ↩️ Tout décocher
                </button>

            </div>

            <!-- Participants -->
            <div id="listeParticipants"></div>

            <hr>

            <!-- Résumé -->
            <div class="row text-center">

                <div class="col-md-4 mb-3">
                    <div>Part individuelle</div>
                    <div
                        id="partIndividuelle"
                        class="summary-value">
                        0.00 €
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <div>Total payé</div>
                    <div
                        id="totalPaye"
                        class="summary-value money-green">
                        0.00 €
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <div>Reste à payer</div>
                    <div
                        id="resteAPayer"
                        class="summary-value money-red">
                        0.00 €
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Réinitialisation -->
    <div class="text-center mt-4">

        <button
            class="btn btn-danger"
            onclick="reinitialiser()">
            🗑️ Réinitialiser toutes les données
        </button>

    </div>

</div>

<script>

let participants = [];
let prixTotalGlobal = 0;
let partIndividuelle = 0;

window.addEventListener("load", chargerDonnees);

function sauvegarderDonnees() {

    const data = {
        participants,
        prixTotalGlobal,
        partIndividuelle
    };

    localStorage.setItem(
        "cadeauData",
        JSON.stringify(data)
    );
}

function chargerDonnees() {

    const data =
        localStorage.getItem("cadeauData");

    if (!data) {
        return;
    }

    try {

        const sauvegarde =
            JSON.parse(data);

        participants =
            sauvegarde.participants || [];

        prixTotalGlobal =
            sauvegarde.prixTotalGlobal || 0;

        partIndividuelle =
            sauvegarde.partIndividuelle || 0;

        if (participants.length === 0) {
            return;
        }

        document.getElementById(
            "nbParticipants"
        ).value = participants.length;

        document.getElementById(
            "prixTotal"
        ).value = prixTotalGlobal;

        document.getElementById(
            "zoneMontant"
        ).style.display = "block";

        document.getElementById(
            "resultats"
        ).style.display = "block";

        document.getElementById(
            "partIndividuelle"
        ).textContent =
            partIndividuelle.toFixed(2) + " €";

        afficherParticipants();

    } catch (e) {

        console.error(
            "Erreur de chargement",
            e
        );

    }
}

function genererParticipants() {

    const nb =
        parseInt(
            document.getElementById(
                "nbParticipants"
            ).value
        );

    if (!nb || nb < 1) {

        alert(
            "Veuillez saisir un nombre valide."
        );

        return;
    }

    let html =
        "<h5 class='mb-3'>Noms des participants</h5>";

    for (let i = 0; i < nb; i++) {

        const nomExistant =
            participants[i]
                ? participants[i].nom
                : "";

        html += `
            <input
                type="text"
                class="form-control mb-2"
                id="participant${i}"
                placeholder="Participant ${i + 1}"
                value="${nomExistant}">
        `;
    }

    document.getElementById(
        "zoneParticipants"
    ).innerHTML = html;

    document.getElementById(
        "zoneMontant"
    ).style.display = "block";
}

function calculer() {

    const nb =
        parseInt(
            document.getElementById(
                "nbParticipants"
            ).value
        );

    const prixTotal =
        parseFloat(
            document.getElementById(
                "prixTotal"
            ).value
        );

    if (!prixTotal || prixTotal <= 0) {

        alert(
            "Veuillez saisir un montant valide."
        );

        return;
    }

    const anciensPaiements = {};

    participants.forEach(p => {
        anciensPaiements[p.nom] = p.paye;
    });

    participants = [];

    for (let i = 0; i < nb; i++) {

        let nom =
            document.getElementById(
                `participant${i}`
            ).value.trim();

        if (!nom) {
            nom = `Participant ${i + 1}`;
        }

        participants.push({
            nom,
            paye:
                anciensPaiements[nom] || false
        });
    }

    prixTotalGlobal = prixTotal;
    partIndividuelle = prixTotal / nb;

    document.getElementById(
        "partIndividuelle"
    ).textContent =
        partIndividuelle.toFixed(2) + " €";

    document.getElementById(
        "resultats"
    ).style.display = "block";

    afficherParticipants();
    sauvegarderDonnees();
}

function afficherParticipants() {

    const liste =
        document.getElementById(
            "listeParticipants"
        );

    let html = "";

    participants.forEach(
        (participant, index) => {

        html += `
        <div class="card participant-card mb-2">

            <div class="card-body">

                <div class="row align-items-center">

                    <div class="col-md-8">

                        <h5 class="mb-2">
                            ${participant.nom}
                        </h5>

                        ${
                            participant.paye
                            ? `
                                <span class="badge bg-success">
                                    ✔ Payé
                                </span>
                              `
                            : `
                                <span class="badge bg-danger">
                                    Reste :
                                    ${partIndividuelle.toFixed(2)} €
                                </span>
                              `
                        }

                    </div>

                    <div
                        class="col-md-4 text-md-end mt-3 mt-md-0">

                        <div
                            class="form-check form-switch d-inline-block">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                ${
                                    participant.paye
                                    ? "checked"
                                    : ""
                                }
                                onchange="mettreAJourPaiement(${index})">

                        </div>

                    </div>

                </div>

            </div>

        </div>
        `;
    });

    liste.innerHTML = html;

    mettreAJourTotaux();
}

function mettreAJourPaiement(index) {

    participants[index].paye =
        !participants[index].paye;

    sauvegarderDonnees();

    afficherParticipants();
}

function toutCocher() {

    participants.forEach(
        p => p.paye = true
    );

    sauvegarderDonnees();
    afficherParticipants();
}

function toutDecocher() {

    participants.forEach(
        p => p.paye = false
    );

    sauvegarderDonnees();
    afficherParticipants();
}

function mettreAJourTotaux() {

    const nbPayes =
        participants.filter(
            p => p.paye
        ).length;

    const totalPaye =
        nbPayes * partIndividuelle;

    const reste =
        Math.max(
            0,
            prixTotalGlobal - totalPaye
        );

    document.getElementById(
        "totalPaye"
    ).textContent =
        totalPaye.toFixed(2) + " €";

    document.getElementById(
        "resteAPayer"
    ).textContent =
        reste.toFixed(2) + " €";

    const pourcentage =
        prixTotalGlobal > 0
        ? (totalPaye / prixTotalGlobal) * 100
        : 0;

    document.getElementById(
        "pourcentageCollecte"
    ).textContent =
        pourcentage.toFixed(0);

    const progressBar =
        document.getElementById(
            "progressBar"
        );

    progressBar.style.width =
        pourcentage + "%";

    progressBar.textContent =
        pourcentage.toFixed(0) + "%";

    progressBar.className =
        pourcentage >= 100
        ? "progress-bar bg-success"
        : "progress-bar";

    sauvegarderDonnees();
}

function reinitialiser() {

    if (
        !confirm(
            "Supprimer toutes les données enregistrées ?"
        )
    ) {
        return;
    }

    localStorage.removeItem(
        "cadeauData"
    );

    location.reload();
}

</script>

</body>
</html>
