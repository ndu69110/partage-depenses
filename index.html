<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Suivi de participation au cadeau</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f8f9fa; }
.progress { height:28px; }
</style>
</head>
<body>
<div class="container py-4">

<h1 class="text-center mb-4">🎁 Suivi de participation au cadeau</h1>

<div class="card mb-3">
<div class="card-body">

<div class="mb-3">
<label class="form-label">Nom de l'acheteur</label>
<input id="buyerName" class="form-control" value="Nicolas">
</div>

<div class="mb-3">
<label class="form-label">Nombre total de participants (acheteur inclus)</label>
<input id="nbParticipants" type="number" min="2" class="form-control">
</div>

<button class="btn btn-primary" onclick="generateParticipants()">
Générer les participants
</button>

<div id="participantsInputs" class="mt-3"></div>

</div>
</div>

<div class="card mb-3" id="giftCard" style="display:none">
<div class="card-body">

<label class="form-label">Prix du cadeau (€)</label>
<input id="giftPrice" type="number" step="0.01" class="form-control">

<button class="btn btn-success mt-3" onclick="buildTracker()">
Calculer
</button>

</div>
</div>

<div id="results" style="display:none">
<div class="card">
<div class="card-body">

<h3>Remboursements</h3>

<div class="progress mb-2">
<div id="bar" class="progress-bar" style="width:0%">0%</div>
</div>

<div>
<strong><span id="pct">0</span>% remboursé</strong>
</div>

<div class="my-3">
<button class="btn btn-success btn-sm" onclick="checkAll()">Tout cocher</button>
<button class="btn btn-warning btn-sm" onclick="uncheckAll()">Tout décocher</button>
</div>

<div id="list"></div>

<hr>

<div class="row text-center">
<div class="col-md-3">
<b>Part individuelle</b>
<div id="share">0 €</div>
</div>

<div class="col-md-3">
<b>Montant remboursé</b>
<div id="reimb">0 €</div>
</div>

<div class="col-md-3">
<b>Reste à rembourser</b>
<div id="remain">0 €</div>
</div>

<div class="col-md-3">
<b>Nombre de remboursements</b>
<div id="count">0</div>
</div>
</div>

</div>
</div>
</div>

<div class="text-center mt-4">
<button class="btn btn-danger" onclick="resetAll()">
🗑 Réinitialiser toutes les données
</button>
</div>

</div>

<script>
let state = {
    buyerName: "Nicolas",
    participants: [],
    giftPrice: 0,
    share: 0
};

function save() {
    localStorage.setItem("giftTrackerFR", JSON.stringify(state));
}

function load() {
    const s = localStorage.getItem("giftTrackerFR");
    if (!s) return;

    state = JSON.parse(s);

    document.getElementById("buyerName").value = state.buyerName || "Nicolas";

    if (state.participants.length) {
        document.getElementById("giftCard").style.display = "block";
        document.getElementById("results").style.display = "block";
        document.getElementById("giftPrice").value = state.giftPrice;
        render();
    }
}

window.onload = load;

function generateParticipants() {
    const n = parseInt(document.getElementById("nbParticipants").value || 0);

    if (n < 2) {
        alert("Minimum 2 participants");
        return;
    }

    let h = "<h5>Participants (hors acheteur)</h5>";

    for (let i = 1; i < n; i++) {
        h += `<input class="form-control mb-2" id="p${i}" placeholder="Participant ${i}">`;
    }

    document.getElementById("participantsInputs").innerHTML = h;
    document.getElementById("giftCard").style.display = "block";
}

function buildTracker() {

    const buyer = document.getElementById("buyerName").value.trim() || "Nicolas";
    const n = parseInt(document.getElementById("nbParticipants").value || 0);
    const price = parseFloat(document.getElementById("giftPrice").value || 0);

    if (n < 2 || price <= 0) {
        alert("Veuillez saisir des valeurs valides");
        return;
    }

    state = {
        buyerName: buyer,
        giftPrice: price,
        share: price / n,
        participants: []
    };

    state.participants.push({
        name: buyer,
        buyer: true,
        reimbursed: true
    });

    for (let i = 1; i < n; i++) {
        let name = document.getElementById(`p${i}`)?.value.trim();
        if (!name) name = `Participant ${i}`;

        state.participants.push({
            name: name,
            buyer: false,
            reimbursed: false
        });
    }

    save();
    document.getElementById("results").style.display = "block";
    render();
}

function render() {

    document.getElementById("share").textContent =
        state.share.toFixed(2) + " €";

    let html = "";

    state.participants.forEach((p, i) => {

        if (p.buyer) {

            html += `
            <div class="card mb-2 border-success">
                <div class="card-body">
                    👑 <strong>${p.name}</strong>
                    <span class="badge bg-success">Acheteur</span>
                </div>
            </div>`;

        } else {

            html += `
            <div class="card mb-2">
                <div class="card-body d-flex justify-content-between align-items-center">

                    <div>
                        <strong>${p.name}</strong><br>
                        ${p.reimbursed
                            ? '<span class="badge bg-success">Remboursé</span>'
                            : `<span class="badge bg-danger">Doit ${state.share.toFixed(2)} €</span>`}
                    </div>

                    <input type="checkbox"
                           class="form-check-input"
                           ${p.reimbursed ? "checked" : ""}
                           onchange="toggle(${i})">

                </div>
            </div>`;
        }
    });

    document.getElementById("list").innerHTML = html;
    updateStats();
}

function toggle(i) {
    state.participants[i].reimbursed = !state.participants[i].reimbursed;
    save();
    render();
}

function checkAll() {
    state.participants.forEach(p => {
        if (!p.buyer) p.reimbursed = true;
    });
    save();
    render();
}

function uncheckAll() {
    state.participants.forEach(p => {
        if (!p.buyer) p.reimbursed = false;
    });
    save();
    render();
}

function updateStats() {

    const reimbCount = state.participants.filter(
        p => !p.buyer && p.reimbursed
    ).length;

    const totalPeople = state.participants.length - 1;

    const reimbursedAmount = reimbCount * state.share;

    const targetAmount = totalPeople * state.share;

    const remainingAmount = Math.max(
        0,
        targetAmount - reimbursedAmount
    );

    const percent = targetAmount
        ? (reimbursedAmount / targetAmount) * 100
        : 0;

    document.getElementById("reimb").textContent =
        reimbursedAmount.toFixed(2) + " €";

    document.getElementById("remain").textContent =
        remainingAmount.toFixed(2) + " €";

    document.getElementById("count").textContent =
        reimbCount + " / " + totalPeople;

    document.getElementById("pct").textContent =
        percent.toFixed(0);

    document.getElementById("bar").style.width =
        percent + "%";

    document.getElementById("bar").textContent =
        percent.toFixed(0) + "%";
}

function resetAll() {
    if (!confirm("Supprimer toutes les données enregistrées ?")) {
        return;
    }

    localStorage.removeItem("giftTrackerFR");
    location.reload();
}
</script>

</body>
</html>
